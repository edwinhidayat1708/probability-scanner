name: Screener probability_based

on:
  schedule:
    - cron: '0 11 * * *'  # 18:00 WIB = 11:00 UTC
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy xgboost  # Menjamin library utama terinstall
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run screener
        env:
          # Bagian ini menghubungkan Secrets GitHub ke script Python
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_probability.py
