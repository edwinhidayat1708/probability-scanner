name: Screener probability_based

on:
  schedule:
    - cron: '0 11 * * *'  # 18:00 WIB = 11:00 UTC
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screener probability.py
